subsystem = AOESW
component = lgsf

description = "LGSF Sequencer commands."
receive = [
  {
    name = setState
    description = """
    Set the state of the LGSF system.

    This is not to be confused with setting the state of the laser system,
    which is one component of the LGSF state.

    The supported LGSF states are:

      * OFFLINE: Used for planned long term down time or maintenance.  In this state,
        all lasers are turned off.  The BTO electronics are on, but mechanisms may
        not be datumed yet. If they are, all the shutters and covers are closed, and
        all the mechanisms are parked.
      * STANDBY: Power to laser system, cooling system, and electronics are
        turned on, but the mechanisms are in their parked positions.  Laser shutters
        remain closed.
      * READY: The required lasers are turned on with all the shutters closed,
        the asterism generator is configured for a dedicated asterism and the
        active arrays are controlled using their LUTs. The LLT cover is open,
        and the BDM shutter is closed.
      * ON-LOW: This state is only used as an intermediate step to transition from
        READY to ON, primarily to prevent stray laser beam light when turning on full
        power.  The laser bench low power modules are inserted with low power settings
        (~0.4W), the laser beams are propagated up to the BDM, which stays closed,
        and the active array loops are closed with LUT and PAC measurements.
      * READY-CALIB: This state is primarily used for daytime calibration but can be
        used any time. This state is the same as READY, but the LLT cover is closed,
        and the LGSF safety system components are off, except for the LGSF LSC and
        associated safety-rated remote I/O, which are on.  This state, along with
        ON-LOW-CALIB, are used instead of READY and ON-LOW, respectively, to improve
        efficiency by eliminating unnecessary motion of the LLT cover, which remains
        closed for daytime calibrations.
      * ON-CALIB: This state is primarily used for daytime calibration but can be used
        any time. This state is the same as ON-LOW, but the LLT cover is closed, and the
        LGSF safety system components are off, except for the LGSF LSC and associated
        safety-rated remote I/O, which are on.
      * ON: In this state, the lasers are turned on, the laser shutters are open,
        as is the the LLT cover, and full power laser beams are propagated up to
        the BDM, which stays closed.  The active array loops are closed with LUT and
        PAC measurements.
      * OBSERVATION: In this state, the LLT cover is open, the BDM is extracted, and
        the laser beams are propagated to the sky. The uplink tip/tilt (FSM)
        loops may be open or closed, depending on the AO system status.
    """
    requiredArgs = [state]
    parameters = [
      {

        name = state
        description = "configuration for LGSF "
        enum = [OFF, STANDBY, READY-CALIB, ON-LOW-CALIB, READY, ON-LOW, ON, OBSERVATION]
      }
    ]
  }
  {
    name = CalibratePacAndMirrorControl
    description = """
      Calibrates the pre-alignment cameras and mirrors.

       This is done by peforming the following:

        * Determine the region of interest for each PAC camera by turning on the PAC LED
        light, taking an exposure, and determine the boundary of the mirror/lens.
        * Determine the mapping from OP and AG PAC mesaurements to the common LGSF Coordinate
        Reference System (LCRS), known as the interaction matrix.  The LCRS is defined at the
        COL entrance pupil with the x-axis pointing toward the ECRS −x-axis and the y-axis
        pointing toward the ECRS z-axis. The reference measurement is provided by the DSWFS
        which is conjugated to this plane.   This is done by moving the corresponding LOM
        actuator so that the beam shifts by a few mm at the LCRS as measured by the DSWFS.
        The change in PAC measurements is then recorded for all illuminated optics and the
        interaction matrix is calculated.
        * Determine the mirror control matrix for each mirror.  This is done by moving the
        mirror by a small amount, calculating the sensitivity matrix using the corresponding
        PAC, and then inversting the sensitivity matrix.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      For more information, see ADD 5.3.1.9	Calibrate PAC and mirror control and
      the LGSF Calibration Plan (TIO.AOS.TEC.17.035).
    """
  }

  {
    name = CalibrateAsterismGenerator
    description = """
      Calibrates the mechainisms used to fold the laser beams to construct the asterism needed
      for each AO mode.

      This done using a seriers of calibration routines using on-axis and
      off-axis beams.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      For more information, see ADD 5.3.1.10 Calibrate asterism generator and
      the LGSF Calibration Plan (TIO.AOS.TEC.17.035).
    """
  }
  {
    name = CalibrateRelayLensFocus
    description = """
      Calibrate the Relay Lens focus control using spot size measurement at the Top End
      with the AGPA PAC.

      Using a single beam at a time, the laser spot size on the AGPA PAC is measured while
      stepping the focus mechanism over a range of positions.  A lookup-table is then
      constructed based on these measurements.

      For more information, see the LGSF Calibration Plan (TIO.AOS.TEC.17.035).
    """
  }
  {
    name = CheckLgsfBtoAndLltAlignment
    description = """
      Confirms the alignment of tbe Beam Transfer Optics and the Laser Launch Telescope by checking
      the illumination of each PAC, DSWFS, and power sensors using low-powered laser light over a
      range of telescope zenith angles.

      An error is raised if not all spots are found.
    """
  }
]

