subsystem = AOESW
component = aosq

description = "AOSQ Sequencer commands."
receive = [
  {
    name = Startup
    description = """
      Performs the activities to start AO systems, including
      NFIRAOS, LGSF, IRIS OIWFS and ODGS, MODHIS OIWFS, and the other AOESW
      subsystems, PSFR and RPG.

      These startup activites are restricted
      to the actions initiated by CSW commands, meaning the components
      of these subsystems are running and ready to accept commands.  Note
      that the AOSQ makes connections to the components when it starts up,
      and not on this command.

      This command initializes AO Assemblies and turns on necessary hardware
      and electronics. It datums all mechanisms and starts tests that ensure
      the they are ready for use.
    """
  }
  {
    name = DetermineLgsWfsSubapaeraturePattern
    description = """
      Performs the calibration routine the determine the
      LGS WFS Subaperature pattern.

      This routine uses the LGS calibration
      source and takes continuous exposures with the LGS WFS.  The RPG
      the averaged pixels to determine and store the subaperture locations.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.1 Determine NFIRAOS LGS WFS subaperture pattern.
    """
  }
  {
    name = DeterminePwfsRefAndSsmPointing
    description = """
      Performs the calibration routine to determine the reference
      pupil image on the PWFS and the SSM pointing model.

      This routine
      takes images of various pinhole locations in NSCU with the PWFS.  For the
      center pinhole, the RTC records pupil images at various pupil offsets.
      For other locations, the pupil centering error is measured.  From the
      offsets, the SSM pointing model is determined.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.2 Determine the Reference Pupil Image on PWFS
      and the SSM Pointing Model.
    """
  }
  {
    name = DetermineOiwfsNsenXyStagePointing
    description = """
      Performs the calibration routine to determine the pointing
      model of the OIWFS POA or NSEN XY stage.

      This routine takes
      images of NSCU light with either the OIWFS cameras or NSEN ACQ for various
      pinhole locations to determine the pointing model.  This can be carried out for
      each AO science instrument, i.e. IRIS and MODHIS.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.3	Determine NFIRAOS Client Instrument OIWFS and NSEN
      XY Stage Pointing Model.
    """
    requiredArgs = [mechanism]
    parameters = [
      {

        name = mechanism
        description = "Mechanism to calibrate"
        enum = [NSEN, IRIS_OIWFS, MODHIS_OIWFS]
      }
    ]
  }
  {
    name = CalibrateTromboneTravelModel
    description = """
      Performs the calibration routine to calculate the trombone
      travel model.

      It does this by moving the LGS calibration source axial
      location to various locations and recording the trombone location
      after thg RTC LGS WFS focus loop stabilizes.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.4	Calibrate LGS Trombone Travel Model.
    """
  }
  {
    name = DetermineDmsToWfsInteractionMatrices
    description = """
      Performs the calibration routine to determine the interaction matrices
      between the NFIRAOS DMs and WFS.

      The RPG sends DM poke commands  to the RTC, which calculates gradients
      from the images from the LGS WFS,
      PWFS, and HRWFS after applying the DM commands. These gradients are
      sent to the RPG, which returns DM0 and DM11 poke commands.  When these
      are applied, the RTC computes the interaction matrices based on these
      measurements.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.5	Determine the NFIRAOS DMs to WFS Interaction Matrices.
    """
    requiredArgs = [dm, wfs]
    parameters = [
      {
        name = dm
        description = "Which DM to calibrate"
        enum = [DM0, DM11]
      }
      {
        name = wfs
        description = "Which WFS to calibrate"
        enum = [LGS, PWFS, HRWFS]
      }
    ]
  }
  {
    name = CalibrateNpca
    description = """
      Orchestrates the calibration of the non-common path aberrations.

      This is done by first updating the LGS WFS reference
      vector, determining the phase diversity algorithm if nessary, and then
      recording the DM commmands, WFS gradients and residual instrument
      image in the NCPA database based on the NCPA calibration results
      for a variety of instrument rotator angles, instrument modes (e.g. filter
      via TBD mechanism), and zenith angles for the calibration sources.
      Ranges for rotator and zenith angles are obtained from a
      configuration file.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.7	Calibrate the NCPA.
    """
    requiredArgs = [instrument]
    parameters = [
      {
        name = instrument
        description = "Which instrument to calibrate"
        enum = [IRIS, MODHIS, NSEN]
      }
    ]
  }
  {
    name = DetermineInstrumentImageDistortion
    description = """
      Performs the calibration routine to determine the image distortion on the science instrument.

      This is done by imaging the
      broadband light from the NSCU on the science instrument with DMs
      flattened at multiple locations, dithering the FPM to move the source.
      This requires the instrument DRS to process the images.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.8	Determine NFIRAOS Instrument Image Distortion.

    """
    requiredArgs = [instrument]
    parameters = [
      {
        name = instrument
        description = "Which instrument to calibrate"
        enum = [IRIS, MODHIS]
      }
    ]
  }
  {
    name = CalibratePacAndMirrorControl
    description = """
      Performs the calibration routine to calibrate control of the LGSF PACs and mirrors.

      This is done by propagating one beam at
      a time, and comparing PAC and DSWFS measurements using an LGSF command.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.9	Calibrate PAC and mirror control.
    """
  }
  {
    name = CalibrateAsterismGenerator
    description = """
      Performs the various commands to calibrate the lasers in
      the LGSF asterism generator.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.10 Calibrate asterism generator.
    """
  }
  {
    name = CalibratteLgsfBtoLut
    description = """
      Performs the calibration routine to construct the lookup table for the LGSF Beam Transfer Optics.

      This is done by
      pointing the telescope to various zenith angles and closing the
      BTO loops using LGSF PACs on a low power laser beam.  The LUT is
      then constructed from the positions of the mirror actuators.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.11 Calibrate LGSF BTO LUT versus Zenith Angle.
    """
  }
  {
    name = CalibrateRelayLensFocus
    description = """
      Calibrates the LGSF relay lens focus by minimizing the
      laser spot size on the AGPA PAC.

      This calibration can be performed during the day time and is expected
      to be performed infrequently.

      See ADD 5.3.1.12 Calibrate Relay Lens focus.
    """
  }
  {
    name = ObtainNfiraosPwfsDarkFrame
    description = """
      This command is used to create a PWFS dark frame.

      The RTC constructs
      the frame from multiple PWFS exposures taken with the NSCU shutter
      closed.

      This calibration can be performed during the day time.

      See ADD 5.3.2.1	Obtain NFIRAOS PWFS Dark Frame.
    """
  }
  {
    name = VerifyDmToWfsRegistration
    description = """
      Runs the calibration routine that verifies the registration
      between the NFIRAOS DM and the LGS WFS and PWFS.

      The RPG computes
      the misregistration by comparing the gradients cmoputed by the RTC
      against gradients computed using the interaction matrix.

      This calibration can be performed during the day time.

      See ADD 5.3.2.2 Verify DM to WFS Registration.
    """
    requiredArgs = [dm, wfs]
    parameters = [
      {
        name = dm
        description = "Which DM to verify"
        enum = [DM0, DM11]
      }
      {
        name = wfs
        description = "Which WFS to verify"
        enum = [LGS, PWFS]
      }
    ]
  }
  {
    name = ExerciseRtcWithNcpaAndSimulatedTurbulence
    description = """
      Exercises the NFIRAOS RTC with NCPA and DM simulated
      turbulance.

      This operation uses simulated LGS and NGS sources
      over a variety of instrument modes and telescope zenith angles.
      Data processed by the RTC, as well as NSEN and science instrument images,
      are sent to the RPG, where they are analyzed and compared to
      values obtained from NCPA calibration.  The RPG then injects
      simulated turbulence on the DMs and checks the performance.

      This calibration can be performed during the day time.

      See ADD 5.3.2.3 Exercise the RTC with NCPA and Simulated Turbulence.
    """
  }
  {
    name = CheckLgsfBtoAndLltAlignment
    description = """
      Checks the alignment between the LGSF Beam transfer optics
      and the laser launch telescope.

      With the laser in low power mode,
      the PACs, DSWFS, and power sensor readings are analyzed over various
      telescope zenith angles to ensure the spots and/or power are sensed.

      This calibration can be performed during the day time.

      See ADD 5.3.2.4	Check LGSF BTO/LLT Alignment.
    """
  }
  {
    name = CheckNfiraosAndInstrumentAlignment
    description = """
      Checks the alignment between NFIRAOS and the specified science
      instrument.

      This is done by taking an image of the calibration
      NGS source with the instrument OIWFS and checking the TTS position.

      This calibration can be performed during the day time.

      See ADD 5.3.2.5	Check NFIRAOS and Instrument Alignment.
    """
    requiredArgs = [instrument]
    parameters = [
      {
        name = instrument
        description = "The instrument to check"
        enum = [IRIS, MODHIS]
      }
    ]
  }
  {
    name = TelescopeToLgsWfsLensetArrayPupilDistortion
    description = """
      Determines the LGS WFS lenslet array pupil distortion.  LGSF
      lasers are fired and acquired in the LGS WFS.

      A set of M1CS segments are pointed away, and RTC reports the flux to the RPG,
      which computes the distortion from the subaperature flux measurements.
      Calls to this command with a list of segments that are pointed away
      causes the data to be recorded.  Once enough measurements are taken,
      call this command without the segment list to compute the distortion
      using the previously recorded data.

      This calibration requires the telescope and must be performed
      at night.

      See ADD 5.3.3.1	Telescope to LGS WFS Lenslet Array Pupil Distortion.
    """
    parameters = [
      {
        name = segmentList
        description = "List of segment numbers of tilted segments."
        type = array
        items = {
          type = integer
        }
        minItems = 1
        maxItems = 492
        minimum = 1
        maximum = 492
      }
    ]
  }
  {
    name = CheckNfiraosOnSkyPupilMisregistrationAndMagnification
    description = """
      Peforms a check of the NFIRAOS pupil misregistration and magnification
      on-sky using a natural guide star.

      This command assumes that
      a preset action has been completed so that the telescope is pointing
      to a star and NFIRAOS and RPG are ready for NGS AO operations.
      Then, in this command, the star is acquired in the PWFS
      and the RPG makes calculations when the RTC closes to the loop.

      This calibration requires the telescope and must be performed
      at night.

      See ADD 5.3.3.2	Check NFIRAOS On Sky Pupil Misregistration/Magnification.
    """
  }
  {
    name = CalibrateTelescopeInducedNcpaOnSky
    description = """
      Calibrates the telescope induced non-common path aberrations with
      on-sky measurements using a natural guide star.

      This command assumes that
      a preset action has been completed so that the telescope is pointing
      to a star and NFIRAOS, LGSF, and RPG are ready for AO operations.
      The LGS is acquired, and then the NGS is
      acquired in the HRWFS.  The same star, or another star is acquired
      in PWFS.  The RPG adjusts the LGS WFS reference vector to null the
      HRWFS gradients.  The changes in the LWFS WFS reference vectors and
      averaged PWFS gradients are recorded as the telescope contribution
      to the NCPA.

      This calibration requires the telescope and must be performed
      at night.

      See ADD 5.3.3.3	Calibrate Telescope Induced NCPA On Sky.
    """
    requiredArgs = [instrument]
    parameters = [
      {
        name = instrument
        description = "Which instrument to calibrate"
        enum = [IRIS, MODHIS, NSEN]
      }
    ]
  }
  {
    name = CheckOutAoPerformanceAndIdentifyVibrationSpectrum
    description = """
      Checks out AO performance on-sky in NGS and LGS AO mode, and
      identifies vibration spectrum in the meantime.

      This command assumes that
      a preset action has been completed so that the telescope is pointing
      to a star and the AO system is ready for AO operations.
      NGS stars are acquired in the PWFS and OIWFS
      of the current science instrument.  The science instrument is then
      used to take an image of the star.  The RTC computes low order mode
      PSDs and sends to RPG, which computes the vibration parameters.  This
      routine can be run in NGS or LGS mode.

      This calibration requires the telescope and must be performed
      at night.

      See ADD 5.3.3.4	Check out AO Performance and Identify Vibration Spectrum.
    """
    requiredArgs = [instrument, mode]
    parameters = [
      {
        name = instrument
        description = "The instrument to use"
        enum = [IRIS, MODHIS]
      }
      {
        name = mode
        description = "AO mode (NGS or LGS)"
        enum = [NGS, LGS]
      }
    ]
  }
  {
    name = CalibrateLgsfFlexureCompensationSystem
    description = """
      Calibrates the LGSF flexure compentation system.

      Assumes telescope
      is pointed to zenith.  LGSF lasers are propagated and acquired
      in the LGS WFS.  LGSF records the adjustment to the global
      (LTPM) and individual beam pointing (AGPA-FSM, AGFSM) for various
      zenith angles, and builds a LUT using the recorded adjustments.

      This calibration requires the telescope and must be performed
      at night.

      See ADD 5.3.3.5	Calibrate the LGSF Flexure Compensation System
      and AGPA-FSM/AGFSM.
    """
  }
  {
    name = CalibrateLgsfCollimatorFocus
    description = """
      Calibrates the LGSF collimator focus.

      Assumes telescope
      is pointed to zenith. LGSF lasers are propagated and acquired
      in the LGS WFS. RPG computes averaged LGS spot size from averaged
      pixels received from RTC.  LGSF focus controller is adjusted to
      optimize collimator spot size.

      This calibration requires the telescope and must be performed
      at night.

      See ADD 5.3.3.6	Calibrate the LGSF Collimator Focus.
    """
  }
  {
    name = CalibrateLgsfPolarizationControl
    description = """
      This command is used to prepare for the routine to
      calibrate the LGSF Quarter Wave Plates.

      Assumes telescope
      is pointed to zenith. LGSF lasers are propagated and acquired
      in the LGS WFS.  The final part is manually performed, in which
      the QWP is rotated to find the angle that produces the most flux.

      This calibration requires the telescope and must be performed
      at night.  It is only expected to be performed once during
      Commissioning.

      See ADD 5.3.3.7	Calibrate the LGSF polarization control.
    """
  }

  {
    name = preset
    description = """
      Configure AO systems for an observation.

      This command occurs
      concurrently with the preset activities of the telescope and science
      instrument, which typically includes the initial slewing of the
      telescope to the science target or acquisition star.

      Before configuring the subsystems, the Instrument Selection Mirror
      is moved to position for the current science instrument, but slightly
      offset to prevent accidental saturation on the science detectors.
      This offset is removed when the telescope move is complete.

      The configuration activities of each subsystem occur in parallel and are
      summarized as follows.

        - NFIRAOS: select beam splitter position, start mechanisms in
          follow mode, configure timing generator and enable triggered
          exposures.  Set AO mode in RTC and start pipeline.
        - RPG: Obtain environment conditions from SCMS and start
          initial processing and send parameters to RTC.  Start listening to RTC.
        - OIWFS/ODGW: Select mode and start follow mode for mechanisms.
          Initialize detector acquisition table.
        - LGSF: Put LGSF in ON state

      This command corresponds to step [S2] in the Observation Workflow,
      and ADD Section 5.4.1	Configure AO Systems (Preset) [S2].
    """
    requiredArgs = [aoMode, nsenMode, instrument, aoConfiguration]
    parameters = [
      {
        name = aoMode
        description = "AO mode"
        enum = [LGSAO, NGSAO]
      }
      {
        name =nsenMode
        description = "Which NSEN sensor to use"
        enum = [ACQ, HRWFS, NONE]
      }
      {
        name = instrument
        description = "The instrument to use"
        enum = [IRIS, MODHIS, NONE]
      }
      {
        name = aoConfiguration
        description = """Modes and tiers of WFS, loop rates, etc.  Format is TBD.
        Information defined in SOSS and passed to ESW, which then sends to AOSQ (this component),
        which finally passes to RTC and RPG."""
        type = string
      }
    ]
  }

  {
    name = AlignLaserThroughBto
    description = """
      Propagate LGSF laser to beam dump and close loops.

      This command corresponds to step [A2] in the Observation Workflow,
      and ADD Section 5.3.2.2 Align Laser through BTO [A2].
    """
  }
  {
    name = CheckLaserPropagationPermission
    description = """
      Check to see if its safe to propagate lasers to sky.

      The details of this command are TBD.

      This command corresponds to step [A3] in the Observation Workflow,
      and ADD Section 5.3.2.3 Check Laser Propagation Permission [A3].
    """
  }
  {
    name = AcquireAndLockLgs
    description = """
      Acquire the LGS and close loop.

      This command propagates
      the LGSF asterism, acquires on PWFS, and closes the FSM (tip/tilt)
      and trombone (focus) loops.  LGS WFS parameters are adjusted as
      needed, including a Rayleigh background calibration, if necessary.
      Then the LGS loop is closed.  Finally, the TCS offloading process
      is started, and the PSD and Slodar statistics are collected and sent
      to RPG.

      This command corresponds to step [A4] in the Observation Workflow,
      and ADD Section 5.3.2.4 Propagate Laser Beam, Acquire LGS,
      and close High Order loops [A4].
    """
  }
  {
    name = AcquireAndLockTtOrTtfAndHoPwfs
    description = """
      Acquire a guide star on PWFS and close tip/tilt/focus loops.

      The guide star should already be place on the PWFS from the preset, but
      if not found, a spiral search is peformed.  Once acquired, a sky
      image may be taken, and any adjustments to PWFS are made.  Then,
      the RTC starts pixel processing. If using Tier0 [A5], the TTF loop is closed.
      Finally, the telescope pupil centering is offloaded to TCS.

      This command corresponds to step [A5] and [A7] in the Observation Workflow,
      and ADD Section 5.4.2.5	Acquire the PWFS Guide Star [A5] or [A7].
    """
  }
  {
    name = AcquireAndLockTtfOiwfs
    description = """
      Acquire the low order tip/tilt/focus WFS and close the loop.

      The TCS  shall place the guide stars on an OIWFS of the current science instrument.
      A spiral search is performed if necessary, due to catalog errors.
      RTC is set to compute gradient from the OIWFS and continuous exposures
      are started.  The RTC then starts the TT and focus mode reconstruction
      and closes the TTF loop.

      This command corresponds to step [A6] in the Observation Workflow,
      and ADD Section 5.4.2.6	Acquire TTF OIWFS Guide Star and Close
      Tip/Tilt/Focus Loops [A6].
    """
  }
  {
    name = AcquireAndLockTtOiwfsOrOdgw
    description = """
      Acquire all low order tip/tilt WFS and close loops.

      The TCS shall place the guide stars on OIWFS's or ODGW (if supported) of the
      current science instrument.  A spiral search is performed if necessary,
      due to catalog errors. RTC is set to compute gradient from the OIWFS/ODGW
      and continuous exposures are started.  The RTC then computes the average
      spot position and closes the tip/tilt and platscale loops.

      This command corresponds to step [A8] in the Observation Workflow,
      and ADD Section 5.4.2.7	Acquire Tip/Tilt WFS Guide Stars and Close
      All Low Order Loops [A8].
    """
  }

  {
    name = AcquireAndLockLoTruthOiwfsOrOdgw
    description = """
      Acquire all low order truth WFS and close loops.

      The TCS shall place the guide stars on OIWFS's or ODGW (if supported) of the
      current science instrument.  A spiral search is performed if necessary,
      due to catalog errors. RTC is set to compute gradient from the OIWFS/ODGW
      and continuous exposures are started.  The RTC then starts the low order
      truth wavefront reconstruction and closes the loop.

      This command corresponds to step [A9] in the Observation Workflow,
      and ADD 5.4.2.8	Acquire Low Order Truth WFS Guide Stars and Close
      Low Order Truth Loops [A9].
    """
  }
  {
    name = SwitchToMatchedFilterAndOffload
    description = """
       Switch all gradient processing algorithms to Matched Filter and
       start SSM and POA offload processes.

      This command corresponds to step [A10] in the Observation Workflow,
      and ADD Section 5.4.2.9	Switch to Matched Filter Gradient Processing
      and Offload SSM and POA [A10].
    """
  }
  {
    name = prepareClosedLoopDither
    description = """
      During an observation, prepare AO systems for a telescope dither move
      in which the correction loops stay closed.

      This command adjusts
      the loops as needed to increase the ability to keeps the loops
      closed during the move.  After this command completes, the telescope
      is moved by ESW, and then the endClosedLoopDither command is called,
      which tightens up the loops again.

      See ADD 5.5.1	Dithering/Nodding with All Loops Closed.
    """
  }
  {
    name = endClosedLoopDither
    description = """
      During an observation, adjust AO systems after a telescope dither move
      in which the correction loops stay closed.

      This command adjusts
      the loops as needed to optimize corrections during an exposure.

      See ADD 5.5.1	Dithering/Nodding with All Loops Closed.
    """
  }
  {
    name = prepareOpenLoopDither
    description = """
      During an observation, prepare AO systems for a telescope dither move
      in which the NGS correction loops are opened.

      This command opens the
      appropriate loop for each WFS and stops continuous exposures.  After
      this command completes, the telescope is moved by ESW, and then the
      endOpenLoopDither command is called, which closes the loops again.

      See ADD 5.5.2	Dithering/Nodding with NGS Loops Open.
    """
  }
  {
    name = endOpenLoopDither
    description = """
      During an observation, closes AO loops after a telescope dither move
      in which the NGS correction loops are opened.

      See ADD 5.5.2	Dithering/Nodding with NGS Loops Open.
    """
  }
  {
    name = prepareNonSidereal
    description = """
      Prepare the AO system for an observation of a non-sidereal object.

      This commands sets gradient processing algorithms to Center of Gravity
      and sets OIWFS/ODGW detectors to use full frame window mode.

      See ADD 5.5.3	Dithering/Nodding with NGS Loops Open.
    """
  }
  {
    name = StopAO
    description = """
      Stop AO systems at the end of an observation.

      See ADD Section 5.7.1 Stop AO Systems.
    """
  }
  {
    name = SuspendAO
    description = """
      Suspend AO systems at the end of an observation.

      This is typically  called after StopAO if the next observation does not use AO.

      See ADD Section 5.7.2 Suspend AO.
    """
  }
  {
    name = ShutdownAO
    description = """
      Shutdown AO systems.

      This is typically called after SuspendAO at the end of the night.

      See ADD Section 5.7.3 Shutdown AO Systems.
    """
  }


  {
    name = enableNfiraosNsen
    description = "Enable continuous exposure of NFIRAOS NSEN to acquire telescope pointing [engineering]"
    parameters = [
      {
        name = mode
        description = "Operation mode of NSEN: Single or continuous exposure, or off."
        enum = [SINGLE, CONTINUOUS, OFF]
      }

    ]
    requiredArgs=[mode]
  }
  {
    name = enableLgsfBto
    description = "Enable laser propagation within LGSF BTO with BDM inserted. [engineering] "
    parameters = [
      {
        name = mode
        description = "Operation mode: Using only look up table [LUT], with prealignment cameras [PAC], or off."
        enum = [ LUT, PAC, OFF]
      }
    ]
    requiredArgs=[mode]
  }
  {
    name = enableLgsfSky
    description = "Enable laser propagation to sky. [engineering]"
    parameters = [
      {
        name = mode
        description = "Operation mode."
        enum = [ON, OFF]
      }
    ]
    requiredArgs=[mode]
  }
  {
    name=enableNfiraosLgs
    description = "Acquire LGS on NFIRAOS LGS WFS.  [engineering]"
  }
  {
    name=enableNfiraosPwfs
    description = "Acquire NGS on NFIRAOS PWFS. [engineering]"
    parameters = [
      {
        name=loopHi
        description = "Enable High order DM control using PWFS. Omit meaning OFF."
        enum=[ON,OFF]
      }
      {
        name=loopLgsTruth
        description = "Enable LGS Truth mode control using PWFS. Omit meaning OFF."
        enum=[ON,OFF]
      }
      {
        name=loopTt
        description = "Enable T/T control using PWFS. Omit meaning OFF."
        enum=[ON,OFF]
      }
    ]
  }

  {
    name=enableOiwfsTtf
    description = "Acquire TTF OIWFS,  [engineering]"
    parameters = [
      {
        name = mode
        description = "Operation mode. On: close the loop. OFF: open the loop."
        enum = [ON, OFF]
      }
    ]
    requiredArgs=[mode]
  }
  {
    name=enableOiwfsTt
